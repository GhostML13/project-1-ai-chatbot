<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --border: #2a2a2e;
    --accent: #e8d5b0;
    --accent-dim: #a89070;
    --user-bg: #1e1c18;
    --claude-bg: #161618;
    --text: #d4cfc8;
    --text-dim: #6e6a64;
    --glow: rgba(232, 213, 176, 0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  /* Subtle noise texture via SVG filter */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .logo em {
    font-style: italic;
  }

  .subtitle {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .api-bar {
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .api-bar label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .api-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .api-input::placeholder { color: var(--border); }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.active { background: #6fcf97; box-shadow: 0 0 6px #6fcf9766; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-dim);
    text-align: center;
  }

  .empty-state .big-text {
    font-family: 'Fraunces', serif;
    font-size: 42px;
    font-weight: 300;
    font-style: italic;
    color: var(--border);
    line-height: 1;
  }

  .empty-state p {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .message {
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 0 16px;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeSlide 0.25s ease forwards;
    opacity: 0;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message:last-child { border-bottom: none; }

  .msg-role {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding-top: 2px;
    text-align: right;
  }

  .message.user .msg-role { color: var(--accent-dim); }
  .message.assistant .msg-role { color: var(--text-dim); }

  .msg-content {
    color: var(--text);
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .msg-content { color: var(--accent); }

  .msg-content code {
    font-family: 'DM Mono', monospace;
    background: var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding-top: 4px;
  }

  .typing span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: blink 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .input-area {
    padding: 20px 32px 28px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 1px var(--glow);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    max-height: 140px;
    min-height: 20px;
  }

  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
    align-self: flex-end;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .footer-hint {
    margin-top: 10px;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    transition: color 0.15s;
    padding: 0;
  }

  .clear-btn:hover { color: var(--accent-dim); }

  .error-msg {
    color: #e07070;
    font-size: 11px;
    padding: 8px 0 0;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><em>Claude</em> Chat</div>
    <div class="subtitle">Anthropic API</div>
  </header>

  <div class="api-bar">
    <label>API Key</label>
    <input class="api-input" id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="big-text">Hello.</div>
      <p>Enter your API key and start chatting</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Ask anything…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
    <div class="footer-hint">
      <span>⏎ new line &nbsp;·&nbsp; Ctrl+⏎ send</span>
      <button class="clear-btn" onclick="clearConversation()">Clear history</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'claude_chat_history';
  const API_KEY_STORAGE = 'claude_api_key';
  let conversation = [];
  let isLoading = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const apiKeyEl = document.getElementById('apiKey');
  const statusDot = document.getElementById('statusDot');
  const errorMsg = document.getElementById('errorMsg');
  const emptyState = document.getElementById('emptyState');

  // Load saved data
  const savedKey = localStorage.getItem(API_KEY_STORAGE);
  if (savedKey) { apiKeyEl.value = savedKey; statusDot.classList.add('active'); }

  const savedHistory = localStorage.getItem(STORAGE_KEY);
  if (savedHistory) {
    try {
      conversation = JSON.parse(savedHistory);
      if (conversation.length) {
        emptyState.remove();
        conversation.forEach(msg => renderMessage(msg.role, msg.content, false));
      }
    } catch(e) { conversation = []; }
  }

  // Save API key on input
  apiKeyEl.addEventListener('input', () => {
    const val = apiKeyEl.value.trim();
    localStorage.setItem(API_KEY_STORAGE, val);
    statusDot.classList.toggle('active', val.startsWith('sk-ant-') && val.length > 20);
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Keyboard shortcuts
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      sendMessage();
    }
  });

  function renderMessage(role, content, animate = true) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (!animate) div.style.animation = 'none', div.style.opacity = '1';
    div.innerHTML = `
      <div class="msg-role">${role === 'user' ? 'You' : 'Claude'}</div>
      <div class="msg-content">${escapeHtml(content)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function renderTyping() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="msg-role">Claude</div>
      <div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    const apiKey = apiKeyEl.value.trim();
    if (!apiKey) {
      showError('Please enter your Anthropic API key above.');
      return;
    }

    clearError();

    // Remove empty state
    if (emptyState.parentElement) emptyState.remove();

    // Add user message
    conversation.push({ role: 'user', content: text });
    renderMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    saveHistory();

    isLoading = true;
    sendBtn.disabled = true;
    renderTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          messages: conversation
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || `HTTP ${response.status}`);
      }

      const reply = data.content?.[0]?.text || '';
      document.getElementById('typingIndicator')?.remove();
      conversation.push({ role: 'assistant', content: reply });
      renderMessage('assistant', reply);
      saveHistory();

    } catch (err) {
      document.getElementById('typingIndicator')?.remove();
      conversation.pop(); // remove the user message we added
      showError(`Error: ${err.message}`);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function saveHistory() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(conversation));
  }

  function clearConversation() {
    conversation = [];
    localStorage.removeItem(STORAGE_KEY);
    messagesEl.innerHTML = '';
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.id = 'emptyState';
    es.innerHTML = '<div class="big-text">Hello.</div><p>Enter your API key and start chatting</p>';
    messagesEl.appendChild(es);
    clearError();
  }

  function showError(msg) {
    errorMsg.textContent = msg;
  }

  function clearError() {
    errorMsg.textContent = '';
  }
</script>
</body>
</html>
